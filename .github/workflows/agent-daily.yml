name: Daily Agent Quality Audit

on:
  schedule:
    # Run at 03:00 UTC every day
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  agent_daily:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd app && npm ci

      - name: Run Daily Agent Reports
        run: npm run agent:daily

      - name: Create or Update Issue
        uses: peter-evans/create-issue-from-file@v4
        if: always()
        with:
          title: Daily Code Quality Report
          content-filepath: agents/agent.log
          labels: code-quality, auto-generated
