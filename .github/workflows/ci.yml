name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      - name: Install
        run: |
          cd app
          npm ci
      - name: Lint
        run: |
          cd app
          npm run lint
      - name: Typecheck
        run: |
          cd app
          npm run typecheck
      - name: Test
        run: |
          cd app
          npm test
      - name: Coverage Ratchet
        run: |
          cd app
          node scripts/coverageRatchet.mjs
